# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "ADHD傾向のある人向け個人メモPWAを完成させる"
  slug: "adhd-quick-capture-memo"
  kind: existing_plan
  tranche: "既存計画を検証し、4つの安全な縦断packageを実装・検証して、GitHub Pages配信と最終監査まで継続する"
  status: done
  oracle:
    signal: "GitHub Pages上のHTTPS版PWAで、スマホ幅の即時記録、永続化、1件ずつの整理、検索、再発見、JSON復元、オフライン操作を完走でき、自動テストが合格する"
    cadence: "after each Worker package and at final audit"
    final_proof: "公開URLのwalkthrough、Vitest、Playwright、build、アクセシビリティ検査を対応付けた最終監査receipt"
  intake:
    original_request: "PlanモードでまとめたADHD傾向のある人向けメモアプリ計画を保ちながら、GoalBuddy用の目標、完了条件、作業ボードを作成する"
    interpreted_outcome: "思いつきを即時記録し、圧倒されず整理し、忘れたメモを再発見できる個人用スマホPWAを実装してGitHub Pagesへ配信する"
    input_shape: existing_plan
    audience: "ADHD傾向があり、主に1台のスマホで思考、用事、URLを個人的に記録する単独ユーザー"
    authority: approved
    proof_type: test
    completion_proof: "公開PWAのスマホ幅受け入れシナリオ、永続化、オフライン、JSON復元、自動テスト、アクセシビリティ検査がすべて合格する"
    likely_misfire: "一般的な多機能メモアプリを作り、保存前の分類や大量の一覧で即時入力と低刺激性を損なう"
    blind_spots_considered:
      - "スマホでの起動障壁と片手操作"
      - "未整理件数と複数カードが与える圧迫感"
      - "端末故障やブラウザデータ削除による消失"
      - "平文JSONバックアップのプライバシー"
      - "オフライン利用とPWA更新"
      - "GitHub Pagesのrepository base path"
      - "復元失敗時の既存データ保護"
      - "キーボード、スクリーンリーダー、動き軽減"
    existing_plan_facts:
      - "スマホ中心で、思考、用事、URLを分類せず記録する"
      - "最優先課題は記録前に思いつきが消えること"
      - "下部固定の記録、整理、探すの3タブ構成"
      - "新規メモは受信箱へ入り、状態はinbox、kept、doneの3つだけ"
      - "整理画面は古いメモを1件ずつ表示し、件数は通常隠す"
      - "全文部分一致検索と、起動ごとの再発見カードを提供する"
      - "端末内IndexedDB保存とJSON書き出し、全置換復元を提供する"
      - "React、TypeScript、Vite、Dexie、Vite PWA plugin、Vitest、Playwrightを使用する"
      - "GitHub PagesへPWAとして配信する"
      - "WCAG 2.2 AAを目標とし、外部送信、解析、外部フォントを使用しない"
      - "クラウド同期、通知、期限、タグ、AI、添付、独自暗号化はMVP外"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/adhd-quick-capture-memo/"
    command: "npx goalbuddy board docs/goals/adhd-quick-capture-memo"

